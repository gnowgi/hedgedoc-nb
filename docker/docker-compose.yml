---
services:
  backend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    depends_on:
      - nlp
    volumes:
      - ./.env:/usr/src/app/backend/.env
      - hedgedoc_uploads:/usr/src/app/backend/uploads

  # nodeBook deterministic NLP microservice (spaCy). Built from the separate
  # github.com/gnowgi/nodebook-nlp repo; set NODEBOOK_NLP_PATH to its checkout
  # (defaults to a sibling clone of this repo). Reachable in-network at nlp:8000.
  nlp:
    build:
      context: ${NODEBOOK_NLP_PATH:-../../nodebook-nlp}
      dockerfile: Dockerfile
      args:
        SPACY_MODEL: "${SPACY_MODEL:-en_core_web_md}"
    image: nodebook-nlp:latest
    restart: unless-stopped
    environment:
      SPACY_MODEL: "${SPACY_MODEL:-en_core_web_md}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    restart: unless-stopped
    build:
      context: ..
      dockerfile: frontend/docker/Dockerfile
    environment:
      HD_BASE_URL: "${HD_BASE_URL}"
      HD_INTERNAL_API_URL: "http://backend:3000/"

  db:
    restart: unless-stopped
    image: postgres:15
    environment:
      POSTGRES_USER: "${HD_DATABASE_USERNAME}"
      POSTGRES_PASSWORD: "${HD_DATABASE_PASSWORD}"
      POSTGRES_DB: "${HD_DATABASE_NAME}"
    volumes:
      - hedgedoc_db:/var/lib/postgresql/data

  seed:
    image: postgres:15-alpine
    depends_on:
      - backend
      - db
    environment:
      PGHOST: db
      PGUSER: "${HD_DATABASE_USERNAME}"
      PGPASSWORD: "${HD_DATABASE_PASSWORD}"
      PGDATABASE: "${HD_DATABASE_NAME}"
    volumes:
      - ./seed-entrypoint.sh:/seed-entrypoint.sh:ro
      - ./seed-content:/seed-content:ro
    entrypoint: ["/bin/sh", "/seed-entrypoint.sh"]
    restart: "no"

  proxy:
    image: caddy:latest
    restart: unless-stopped
    environment:
      HD_BASE_URL: "${HD_BASE_URL}"
    ports:
      - "3080:3080"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data

volumes:
  hedgedoc_db:
  hedgedoc_uploads:
  caddy_data:
