#
# Local dev override. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
---
services:
  proxy:
    ports: !override
      - "3080:3080"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile

  # Publish the NLP service to the host for local debugging (in-network the
  # backend still reaches it at nlp:8000). Host: curl localhost:8008/health
  nlp:
    ports:
      - "8008:8000"
